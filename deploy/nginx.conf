server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # PWA manifest MIME type
    types {
        application/manifest+json  webmanifest;
    }
    default_type  application/octet-stream;
    include       /etc/nginx/mime.types;

    # Service worker should never be cached -- it controls everything else.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Long cache for hashed-ish static assets (images, audio).
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Short cache for JS / CSS so updates roll out within an hour.
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Manifest cached briefly.
    location = /manifest.webmanifest {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }

    # SPA-ish fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable noisy logs for the favicon.
    location = /favicon.ico { log_not_found off; access_log off; }
}
