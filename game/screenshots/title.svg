<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" font-family="Georgia, 'Palatino', serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2b1a4a"/>
      <stop offset="40%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0f0720"/>
    </radialGradient>
    <linearGradient id="btnPrimary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4325c"/>
      <stop offset="100%" stop-color="#8b1e3f"/>
    </linearGradient>
    <linearGradient id="btnNormal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b2766"/>
      <stop offset="100%" stop-color="#2a1a4a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#fff" opacity="0.7">
    <circle cx="80"  cy="120" r="1.2"/>
    <circle cx="200" cy="60"  r="1"/>
    <circle cx="350" cy="180" r="1.4"/>
    <circle cx="520" cy="90"  r="1"/>
    <circle cx="680" cy="220" r="1.2"/>
    <circle cx="820" cy="60"  r="1"/>
    <circle cx="980" cy="160" r="1.6"/>
    <circle cx="1100" cy="100" r="1"/>
    <circle cx="120" cy="540" r="1"/>
    <circle cx="280" cy="600" r="1.4"/>
    <circle cx="450" cy="560" r="1"/>
    <circle cx="640" cy="610" r="1.2"/>
    <circle cx="800" cy="540" r="1"/>
    <circle cx="950" cy="600" r="1.4"/>
    <circle cx="1100" cy="560" r="1"/>
  </g>
  <g fill="#ffd764">
    <circle cx="240" cy="160" r="2"/>
    <circle cx="780" cy="180" r="2"/>
    <circle cx="180" cy="620" r="2.4"/>
    <circle cx="980" cy="500" r="2"/>
  </g>

  <!-- title -->
  <text x="600" y="180" text-anchor="middle" font-size="28" fill="#d9c79a" font-style="italic" letter-spacing="2">Charles &amp; Brandon's</text>
  <text x="600" y="280" text-anchor="middle" font-size="86" font-weight="900" fill="#ffd764" filter="url(#glow)">Wizarding World</text>
  <text x="600" y="320" text-anchor="middle" font-size="24" fill="#f4e9d1" font-style="italic">of</text>
  <text x="600" y="410" text-anchor="middle" font-size="100" font-weight="900" fill="#c4325c" filter="url(#glow)">Nuts</text>

  <text x="600" y="460" text-anchor="middle" font-size="22" fill="#f4e9d1" font-style="italic" opacity="0.9">A Match-3 Spellbound Adventure</text>

  <!-- buttons -->
  <g>
    <rect x="465" y="490" width="270" height="56" rx="10" fill="url(#btnPrimary)" stroke="#ffd764" stroke-width="2.5"/>
    <text x="600" y="527" text-anchor="middle" font-size="22" font-weight="700" fill="#f4e9d1">Begin Adventure</text>
  </g>
  <g>
    <rect x="500" y="558" width="200" height="44" rx="10" fill="url(#btnNormal)" stroke="#f4c542" stroke-width="2"/>
    <text x="600" y="588" text-anchor="middle" font-size="18" font-weight="700" fill="#f4e9d1">Settings</text>
  </g>

  <text x="600" y="650" text-anchor="middle" font-size="14" fill="#d9c79a" font-style="italic" opacity="0.7">Brewed by Charles &amp; Brandon in the Great Nuttery</text>
</svg>
