      <stop offset="30%" stop-color="#bde6ff"/>
      <stop offset="70%" stop-color="#6b21a8"/>
      <stop offset="100%" stop-color="#2a0b4a"/>
    </radialGradient>
    <pattern id="jinxPat" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <rect width="7" height="14" fill="#6b21a8" opacity="0.85"/>
      <rect x="7" width="7" height="14" fill="#000" opacity="0.7"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
