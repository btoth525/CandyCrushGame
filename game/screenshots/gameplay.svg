<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Georgia, serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2b1a4a"/>
      <stop offset="40%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0f0720"/>
    </radialGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1230"/>
      <stop offset="100%" stop-color="#0f0820"/>
    </linearGradient>
    <linearGradient id="acorn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a06a35"/><stop offset="1" stop-color="#6b4720"/></linearGradient>
    <linearGradient id="walnut" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d39870"/><stop offset="1" stop-color="#8b5a2b"/></linearGradient>
    <linearGradient id="chestnut" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8a4a20"/><stop offset="1" stop-color="#4a2410"/></linearGradient>
    <linearGradient id="hazel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f59020"/><stop offset="1" stop-color="#a35a08"/></linearGradient>
    <linearGradient id="pecan" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5d020"/><stop offset="1" stop-color="#a37e08"/></linearGradient>
    <linearGradient id="almond" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0e4c8"/><stop offset="1" stop-color="#a89a78"/></linearGradient>
