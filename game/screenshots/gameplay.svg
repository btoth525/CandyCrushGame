    <linearGradient id="wandG" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5a3a14"/><stop offset="0.5" stop-color="#8b6614"/><stop offset="1" stop-color="#2a1a08"/></linearGradient>
    <!-- potion -->
    <linearGradient id="pot-bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a4836"/><stop offset="1" stop-color="#051a10"/></linearGradient>
    <linearGradient id="potG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6cffca"/><stop offset="1" stop-color="#073d2a"/></linearGradient>
